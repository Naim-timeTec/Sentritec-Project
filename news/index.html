  <script>
    /* Featured stories — arrows cycle through the 5 latest (wraps around) */
    (function () {
      var slides = Array.prototype.slice.call(document.querySelectorAll("#nwSlides .nw-slide"));
      if (!slides.length) return;
      var i = 0;
      function show(n) {
        i = (n + slides.length) % slides.length;
        slides.forEach(function (s, idx) { s.classList.toggle("active", idx === i); });
      }
      Array.prototype.slice.call(document.querySelectorAll(".nw-arrow")).forEach(function (a) {
        a.addEventListener("click", function () {
          show(i + (parseInt(a.getAttribute("data-dir"), 10) || 1));
        });
      });
    })();
  </script>
